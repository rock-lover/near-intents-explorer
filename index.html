<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEAR Intents Explorer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #e0e0e0; min-height: 100vh; }
.container { max-width: 900px; margin: 0 auto; padding: 20px; }
h1 { color: #58a6ff; margin-bottom: 4px; font-size: 1.6em; }
.subtitle { color: #8b949e; margin-bottom: 24px; font-size: 0.9em; }
.search-box { display: flex; gap: 8px; margin-bottom: 24px; }
.search-box input { flex: 1; padding: 12px 16px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; color: #e0e0e0; font-size: 14px; outline: none; }
.search-box input:focus { border-color: #58a6ff; }
.search-box button { padding: 12px 24px; background: #238636; border: none; border-radius: 8px; color: white; font-weight: 600; cursor: pointer; font-size: 14px; }
.search-box button:hover { background: #2ea043; }
.search-box button:disabled { background: #21262d; color: #484f58; cursor: wait; }
.filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.filters button { padding: 6px 14px; background: #21262d; border: 1px solid #30363d; border-radius: 16px; color: #8b949e; cursor: pointer; font-size: 12px; }
.filters button.active { background: #1c2333; border-color: #58a6ff; color: #58a6ff; }
.summary { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
.summary .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 12px 16px; flex: 1; min-width: 120px; }
.summary .card .label { color: #8b949e; font-size: 11px; text-transform: uppercase; }
.summary .card .value { color: #58a6ff; font-size: 1.3em; font-weight: 600; margin-top: 2px; }
.op-list { display: flex; flex-direction: column; gap: 6px; }
.op { display: flex; align-items: center; padding: 12px 16px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; gap: 12px; }
.op:hover { border-color: #484f58; }
.op .op-type { width: 80px; min-width: 80px; text-align: center; font-weight: 700; font-size: 12px; border-radius: 4px; padding: 4px 0; text-transform: uppercase; }
.op .op-type.swap { color: #d2a8ff; background: #1c1530; }
.op .op-type.deposit { color: #3fb950; background: #0d2818; }
.op .op-type.withdraw { color: #f85149; background: #2d1215; }
.op .op-amount { flex: 1; min-width: 0; }
.op .op-amount .main { font-weight: 600; font-size: 15px; white-space: nowrap; }
.op .op-amount .main .out-token { color: #f85149; }
.op .op-amount .main .in-token { color: #3fb950; }
.op .op-amount .main .arrow { color: #484f58; margin: 0 6px; }
.op .op-amount .main .single { color: #79c0ff; }
.op .op-who { color: #8b949e; font-size: 13px; font-weight: 400; }
.op .op-who a { color: #58a6ff; text-decoration: none; }
.op .op-who a:hover { text-decoration: underline; }
.op .op-meta { color: #8b949e; font-size: 12px; margin-top: 2px; }
.op .op-meta a { color: #58a6ff; text-decoration: none; font-family: monospace; font-size: 11px; }
.op .op-meta a:hover { text-decoration: underline; }
.op .op-usd { color: #8b949e; font-size: 12px; min-width: 70px; text-align: right; white-space: nowrap; }
.loading { text-align: center; padding: 40px; color: #8b949e; }
.footer { text-align: center; margin-top: 32px; padding-top: 16px; border-top: 1px solid #30363d; color: #484f58; font-size: 12px; }
.footer a { color: #58a6ff; text-decoration: none; }
@media (max-width: 600px) {
  .container { padding: 12px; }
  h1 { font-size: 1.3em; }
  .summary { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .summary .card { min-width: 0; }
  .op { flex-wrap: wrap; padding: 10px 12px; gap: 8px; }
  .op .op-type { width: auto; min-width: auto; font-size: 11px; padding: 3px 8px; }
  .op .op-amount { width: 100%; order: 2; }
  .op .op-amount .main { font-size: 14px; white-space: normal; word-break: break-word; }
  .op .op-usd { order: 1; }
  .filters { gap: 6px; }
  .filters button { padding: 5px 10px; font-size: 11px; }
}
</style>
</head>
<body>
<div class="container">
  <h1>NEAR Intents Explorer</h1>
  <p class="subtitle">Swaps, deposits, and withdrawals through NEAR Intents</p>

  <div class="search-box">
    <input type="text" id="account" placeholder="Enter NEAR account (e.g. zavodil.near)" />
    <button id="searchBtn" onclick="search()">Search</button>
  </div>

  <div class="filters" id="filters" style="display:none">
    <button class="active" data-filter="all" onclick="setFilter('all',this)">All</button>
    <button data-filter="swap" onclick="setFilter('swap',this)">Swaps</button>
    <button data-filter="deposit" onclick="setFilter('deposit',this)">Deposits</button>
    <button data-filter="withdraw" onclick="setFilter('withdraw',this)">Withdrawals</button>
  </div>

  <div class="summary" id="summary" style="display:none">
    <div class="card"><div class="label">Txs Loaded</div><div class="value" id="txsLoaded">0</div></div>
    <div class="card"><div class="label">Intents Ops</div><div class="value" id="opsCount">0</div></div>
    <div class="card"><div class="label">Swaps</div><div class="value" id="swapsCount">0</div></div>
    <div class="card"><div class="label">Volume (est.)</div><div class="value" id="totalUsd">$0</div></div>
  </div>

  <div id="results"></div>

  <div class="footer">
    Built by <a href="https://near.fm/profile/cf847e7565b443ea0535ac21e14f042875d1be3d18b886077227d6f520d450a2">Rock Lover</a> ·
    <a href="https://github.com/rock-lover/near-intents-explorer">GitHub</a> ·
    Powered by <a href="https://transfers.main.fastnear.com">FastNear Transfers API</a>
  </div>
</div>

<script>
const API = 'https://transfers.main.fastnear.com/v0/transfers';
let allTransfers = [];
let operations = [];
let totalLoaded = 0;
let resumeToken = null;
let currentAccount = '';
let currentFilter = 'all';
let loading = false;

function isNamed(acc) { return acc && acc.includes('.'); }

function getAssetLabel(assetId) {
  if (!assetId) return '?';
  if (assetId.includes('17208628f84f5d6ad33f0da3bbbeb27ffcb398eac501a31bd6ad2011e36133a1')) return 'USDC';
  if (assetId.includes('usdt.tether-token.near')) return 'USDT';
  if (assetId.includes('wrap.near')) return 'wNEAR';
  if (assetId === 'native:near') return 'NEAR';
  const match = assetId.match(/nep141:([^:]+)/);
  if (match) { const parts = match[1].split('.'); return parts[0].toUpperCase().slice(0,8); }
  const mt = assetId.match(/nep245:.*?:nep141:(.+)/);
  if (mt) return getAssetLabel('nep141:' + mt[1]);
  return '?';
}

function fmtAmt(n) {
  const a = Math.abs(n);
  if (a >= 1000) return a.toLocaleString('en', {maximumFractionDigits: 2});
  if (a >= 1) return a.toFixed(2);
  if (a >= 0.0001) return a.toFixed(4);
  return a.toFixed(6);
}

function formatDate(ts) {
  if (!ts) return '';
  const ms = typeof ts === 'string' ? parseInt(ts) / 1e6 : ts / 1e6;
  const d = new Date(ms);
  if (isNaN(d.getTime())) return '';
  const now = new Date();
  const diff = now - d;
  if (diff < 3600000) return Math.floor(diff/60000) + 'm ago';
  if (diff < 86400000) return Math.floor(diff/3600000) + 'h ago';
  if (diff < 604800000) return Math.floor(diff/86400000) + 'd ago';
  return d.toLocaleDateString('en', {month:'short', day:'numeric', year: d.getFullYear() !== now.getFullYear() ? 'numeric' : undefined});
}

function groupIntoOps(transfers) {
  const byTx = {};
  transfers.forEach(t => {
    const txId = t.transaction_id || 'unknown';
    if (!byTx[txId]) byTx[txId] = [];
    byTx[txId].push(t);
  });

  const ops = [];
  for (const [txId, items] of Object.entries(byTx)) {
    const outItems = items.filter(t => parseFloat(t.human_amount || 0) < 0);
    const inItems = items.filter(t => parseFloat(t.human_amount || 0) > 0);
    const ts = items[0].block_timestamp;
    const totalUsd = items.reduce((s, t) => s + Math.abs(parseFloat(t.usd_amount || 0)), 0) / 2 ||
                     items.reduce((s, t) => s + Math.abs(parseFloat(t.usd_amount || 0)), 0);

    let type, label;
    const outAssets = new Set(outItems.map(t => getAssetLabel(t.asset_id)));
    const inAssets = new Set(inItems.map(t => getAssetLabel(t.asset_id)));
    const sameAsset = outAssets.size === 1 && inAssets.size === 1 && [...outAssets][0] === [...inAssets][0];
    if (outItems.length > 0 && inItems.length > 0 && !sameAsset) {
      type = 'swap';
      const outParts = outItems.map(t => fmtAmt(parseFloat(t.human_amount)) + ' ' + getAssetLabel(t.asset_id));
      const inParts = inItems.map(t => fmtAmt(parseFloat(t.human_amount)) + ' ' + getAssetLabel(t.asset_id));
      label = `<span class="out-token">${outParts.join(' + ')}</span><span class="arrow">→</span><span class="in-token">${inParts.join(' + ')}</span>`;
      // For swap USD, take the larger side (they should be ~equal)
    } else if (outItems.length > 0 && inItems.length === 0) {
      type = 'withdraw';
      const parts = outItems.map(t => fmtAmt(parseFloat(t.human_amount)) + ' ' + getAssetLabel(t.asset_id));
      label = `<span class="single">${parts.join(' + ')}</span>`;
    } else if (inItems.length > 0 && outItems.length === 0) {
      type = 'deposit';
      const parts = inItems.map(t => fmtAmt(parseFloat(t.human_amount)) + ' ' + getAssetLabel(t.asset_id));
      label = `<span class="single">${parts.join(' + ')}</span>`;
    } else {
      // same asset in+out — net it
      const net = items.reduce((s, t) => s + parseFloat(t.human_amount || 0), 0);
      type = net >= 0 ? 'deposit' : 'withdraw';
      const asset = getAssetLabel(items[0].asset_id);
      label = `<span class="single">${fmtAmt(net)} ${asset}</span>`;
    }

    const usdAmt = type === 'swap'
      ? Math.max(...items.map(t => Math.abs(parseFloat(t.usd_amount || 0))))
      : items.reduce((s, t) => s + Math.abs(parseFloat(t.usd_amount || 0)), 0);

    // find counterparty from items
    const others = items.map(t => t.other_account_id).filter(Boolean);
    const counterparty = others.length ? others[0] : null;

    ops.push({ txId, type, label, ts, usdAmt, counterparty, items });
  }

  return ops;
}

function fmtAccount(acc) {
  if (!acc) return '';
  if (isNamed(acc)) return acc;
  return acc.slice(0, 8) + '...' + acc.slice(-4);
}

function renderOp(op) {
  const date = formatDate(op.ts);
  const usd = op.usdAmt > 0.01 ? '$' + op.usdAmt.toFixed(2) : '';
  const txLink = `<a href="https://near.rocks/tx/${op.txId}" target="_blank" title="${op.txId}">${op.txId.slice(0,8)}...</a>`;
  const who = op.counterparty ? `<span class="op-who">${op.type === 'deposit' ? 'from ' : op.type === 'withdraw' ? 'to ' : ''}<a href="https://near.rocks/account/${op.counterparty}" target="_blank" title="${op.counterparty}">${fmtAccount(op.counterparty)}</a></span>` : '';

  return `<div class="op">
    <div class="op-type ${op.type}">${op.type}</div>
    <div class="op-amount">
      <div class="main">${op.label}${who ? ' ' + who : ''}</div>
      <div class="op-meta">${date}${date ? ' · ' : ''}${txLink}</div>
    </div>
    <div class="op-usd">${usd}</div>
  </div>`;
}

function updateSummary() {
  const swaps = operations.filter(o => o.type === 'swap').length;
  const totalUsd = operations.reduce((s, o) => s + o.usdAmt, 0);
  const spinner = loading ? ' ⏳' : '';
  document.getElementById('txsLoaded').textContent = totalLoaded.toLocaleString() + spinner;
  document.getElementById('opsCount').textContent = operations.length + spinner;
  document.getElementById('swapsCount').textContent = swaps + spinner;
  document.getElementById('totalUsd').textContent = '$' + totalUsd.toFixed(2) + spinner;
}

function render() {
  operations = groupIntoOps(allTransfers);
  const filtered = currentFilter === 'all' ? operations : operations.filter(o => o.type === currentFilter);
  document.getElementById('results').innerHTML = filtered.length ?
    '<div class="op-list">' + filtered.map(renderOp).join('') + '</div>' :
    (loading ? '<div class="loading">Loading intents operations...</div>' : '<div class="loading">No intents operations found for this account</div>');
  updateSummary();
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

async function fetchTransfers(account, resume) {
  const body = { account_id: account, limit: 50, desc: true };
  if (resume) body.resume_token = resume;
  const resp = await fetch(API, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
  if (!resp.ok) throw new Error('HTTP ' + resp.status);
  return await resp.json();
}

async function search() {
  const account = document.getElementById('account').value.trim();
  if (!account) return;
  currentAccount = account;
  allTransfers = [];
  operations = [];
  totalLoaded = 0;
  resumeToken = null;
  loading = true;
  currentFilter = 'all';
  document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
  document.querySelector('.filters button[data-filter="all"]').classList.add('active');
  document.getElementById('results').innerHTML = '<div class="loading">Loading intents operations...</div>';
  document.getElementById('filters').style.display = 'flex';
  document.getElementById('summary').style.display = 'flex';
  document.getElementById('searchBtn').disabled = true;
  document.getElementById('searchBtn').textContent = 'Loading...';

  await loadAllPages(account);
  loading = false;
  render();
  document.getElementById('searchBtn').disabled = false;
  document.getElementById('searchBtn').textContent = 'Search';
}

async function loadAllPages(account) {
  let token = resumeToken || null;
  while (true) {
    showStatusBar('Loading... ' + operations.length + ' intents ops found');
    try {
      const data = await fetchTransfers(account, token);
      const raw = data.transfers || [];
      if (raw.length === 0) break;
      totalLoaded += raw.length;
      const batch = raw.filter(t => t.transfer_type === 'MtTransfer');
      allTransfers = allTransfers.concat(batch);
      token = data.resume_token || null;
      resumeToken = token;
      render();
      if (!token) break;
      await new Promise(r => setTimeout(r, 1500));
    } catch(e) {
      resumeToken = token;
      render();
      const wait = 20;
      let skipWait = false;
      window._retryNow = () => { skipWait = true; };
      for (let i = wait; i > 0 && !skipWait; i--) {
        showStatusBar('Rate limited — ' + operations.length + ' ops found. Retrying in ' + i + 's... <button onclick="window._retryNow()" style="margin-left:12px;padding:5px 14px;background:#238636;border:none;border-radius:6px;color:white;cursor:pointer;font-size:13px;">Retry now</button>');
        await new Promise(r => setTimeout(r, 1000));
      }
      showStatusBar('Retrying...');
      continue;
    }
  }
  resumeToken = null;
  showStatusBar(null);
}

function showStatusBar(message) {
  let bar = document.getElementById('statusBar');
  if (!message) { if (bar) bar.remove(); return; }
  if (!bar) {
    bar = document.createElement('div');
    bar.id = 'statusBar';
    document.getElementById('summary').after(bar);
  }
  const isError = message.includes('Rate limited');
  bar.style.cssText = 'text-align:center;padding:10px 16px;margin-bottom:12px;border-radius:8px;font-size:13px;' +
    (isError ? 'background:#2d1215;color:#f85149;' : 'background:#1c2333;color:#8b949e;');
  bar.innerHTML = message;
}

document.getElementById('account').addEventListener('keypress', e => { if (e.key === 'Enter') search(); });

const params = new URLSearchParams(window.location.search);
if (params.get('account')) {
  document.getElementById('account').value = params.get('account');
  search();
}
</script>
</body>
</html>
